<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login</title>
  <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
  <main>
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <h2>Conectare</h2>
          <p>Introdu contul tău pentru a accesa dashboard-ul</p>
        </div>
        <form id="loginForm">
          <div class="input-row">
            <label for="loginEmail">Email</label>
            <input id="loginEmail" type="email" name="email" required>
          </div>
          <div class="input-row">
            <label for="loginPassword">Parolă</label>
            <input id="loginPassword" type="password" name="password" required>
          </div>
          <div class="auth-actions">
            <button type="submit">Conectează-te</button>
            <button type="button" class="btn-secondary" onclick="window.location.href='register.html'">Înregistrează-te</button>
          </div>
          <div id="loginMessage" class="message" role="status" aria-live="polite"></div>
        </form>
        <div class="auth-footer">Nu ai cont? <a href="register.html">Creează unul</a></div>
      </div>
    </div>
  </main>
  <script src="js/script.js"></script>
</body>
</html>
